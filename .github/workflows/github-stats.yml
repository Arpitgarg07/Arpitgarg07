name: GitHub Stats Cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jstrieb/github-stats@master
        env:
          ACCESS_TOKEN: ${{ secrets.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 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move generated files
        run: |
          mkdir -p generated
          cp generated/overview.svg generated/overview.svg 2>/dev/null || true
          cp generated/languages.svg generated/languages.svg 2>/dev/null || true

      - name: Push generated stats
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add generated/
          if git commit -m "update stats cards"; then
            git push
          fi
