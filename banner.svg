<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="45%" style="stop-color:#3b0764"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)"/>

  <!-- Bottom wave shape -->
  <path d="M0,140 C200,100 400,170 600,130 C800,90 1000,160 1200,120 L1200,200 L0,200 Z" fill="url(#wave1)"/>
  <path d="M0,160 C150,130 350,180 600,150 C850,120 1050,170 1200,140 L1200,200 L0,200 Z" fill="url(#wave2)"/>

  <!-- Dot pattern top right -->
  <circle cx="1050" cy="30" r="2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="1080" cy="20" r="1.5" fill="#a78bfa" opacity="0.3"/>
  <circle cx="1110" cy="40" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="1140" cy="15" r="1" fill="#a78bfa" opacity="0.3"/>
  <circle cx="1160" cy="50" r="2.5" fill="#6d28d9" opacity="0.5"/>
  <circle cx="1070" cy="60" r="1.5" fill="#a78bfa" opacity="0.25"/>
  <circle cx="1100" cy="70" r="1" fill="#a78bfa" opacity="0.3"/>
  <circle cx="1170" cy="30" r="1.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="1185" cy="65" r="1" fill="#6d28d9" opacity="0.35"/>

  <!-- Dot pattern top left -->
  <circle cx="30" cy="25" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="60" cy="15" r="1.5" fill="#a78bfa" opacity="0.25"/>
  <circle cx="20" cy="55" r="1" fill="#a78bfa" opacity="0.35"/>
  <circle cx="50" cy="45" r="2" fill="#6d28d9" opacity="0.4"/>

  <!-- Main text: ARPIT GARG -->
  <text x="600" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="700" fill="#ede9fe" text-anchor="middle" letter-spacing="8" opacity="0.97">ARPIT GARG</text>

  <!-- Subtitle -->
  <text x="600" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="400" fill="#a78bfa" text-anchor="middle" letter-spacing="3">Product Designer  &amp;  Full Stack Developer</text>

  <!-- Subtle line under subtitle -->
  <line x1="430" y1="142" x2="770" y2="142" stroke="#6d28d9" stroke-width="0.8" opacity="0.6"/>
</svg>
